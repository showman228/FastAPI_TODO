<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заметки</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-shell">

  <!-- ======================= ПАНЕЛЬ АККАУНТА ======================= -->
  <aside class="account-panel">
    <div class="brand">
      <div class="logo-mark"></div>
      <span class="brand-name">Заметки</span>
    </div>

    <div class="account-info">
      <span class="avatar" id="account-avatar"></span>
      <span class="account-text">
        <span class="account-username" id="account-username"></span>
        <span class="account-email" id="account-email"></span>
      </span>
      <button id="logout-btn" class="icon-btn" type="button" aria-label="Выйти">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- ======================= СПИСОК ЗАМЕТОК ======================= -->
  <main class="list-panel">
    <div class="list-header">
      <div class="list-header-top">
        <h1 class="list-title">Все заметки</h1>

        <button id="compose-btn" class="compose-btn" type="button" aria-label="Новая заметка">+</button>
      </div>
    </div>

    <!-- Список заметок рендерится через notes.js после загрузки -->
    <ul class="notes-list"></ul>

  </main>

</div>

<script type="module" src="js/notes.js"></script>
</body>
</html>
