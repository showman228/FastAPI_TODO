<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подготовка к собеседованию — неделя 3 | Заметки</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="note-page">

  <div class="note-toolbar">
    <a href="notes.html" class="back-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Заметки
    </a>

    <div class="toolbar-actions">
      <button id="delete-note-btn" class="icon-btn danger" type="button" aria-label="Удалить">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
    </div>
  </div>

  <!--
    Заголовок и тело заметки редактируются на месте (contenteditable)
    и сохраняются через app.js по blur. note-meta показывает дату создания.
  -->
  <div class="note-content">
    <p class="note-meta" id="note-meta"></p>
    <h1 class="note-heading" id="note-heading" contenteditable="true" data-placeholder="Без названия"></h1>

    <div class="note-body" id="note-body" contenteditable="true" data-placeholder="Начните печатать..."></div>
  </div>

</div>

<script type="module" src="js/note.js"></script>
</body>
</html>
